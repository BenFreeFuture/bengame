<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>名校缘分·悬念硬币 | QS世界名校库</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: transparent !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            width: 350px;
            height: 280px;
            background: #F6D3A1;
            background-image: radial-gradient(circle at 10% 20%, rgba(194,15,8,0.08) 2%, transparent 2.5%);
            background-size: 14px 14px;
            border-radius: 28px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25), inset 0 1px 2px rgba(255,245,210,0.6);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            border: 1px solid rgba(194,15,8,0.35);
        }

        .game-container::-webkit-scrollbar {
            width: 4px;
        }
        .game-container::-webkit-scrollbar-track {
            background: #e2c28b;
            border-radius: 10px;
        }
        .game-container::-webkit-scrollbar-thumb {
            background: #C20F08;
            border-radius: 10px;
        }

        .game-inner {
            padding: 6px 10px 8px 10px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stats-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 20, 15, 0.3);
            backdrop-filter: blur(3px);
            border-radius: 40px;
            padding: 2px 8px;
            font-weight: bold;
            gap: 5px;
            flex-shrink: 0;
        }

        .stat-box {
            background: #2d2b26;
            padding: 2px 6px;
            border-radius: 24px;
            color: #F6D3A1;
            font-size: 0.6rem;
            display: flex;
            align-items: baseline;
            gap: 3px;
        }

        .stat-number {
            font-size: 1rem;
            font-weight: 800;
            color: #C20F08;
        }

        .attempt-count {
            background: #C20F08;
            padding: 2px 8px;
            border-radius: 24px;
            color: #F6D3A1;
            font-size: 0.65rem;
            font-weight: bold;
            display: flex;
            align-items: baseline;
            gap: 3px;
            box-shadow: 0 1px 2px black;
        }
        .attempt-count span {
            font-size: 1rem;
            font-weight: 800;
            color: #F6D3A1;
        }

        .reset-stat {
            background: #C20F08;
            border: none;
            color: #F6D3A1;
            border-radius: 30px;
            font-size: 0.55rem;
            padding: 2px 7px;
            cursor: pointer;
            font-weight: bold;
        }

        .reset-stat:active {
            transform: scale(0.96);
        }

        .admission-message-area {
            width: 250px;
            margin: 4px auto 0 auto;
            text-align: center;
            background: rgba(194,15,8,0.15);
            border-radius: 40px;
            padding: 5px 8px;
            backdrop-filter: blur(2px);
            flex-shrink: 0;
        }

        .admission-text {
            font-size: 0.85rem;
            font-weight: 800;
            color: #C20F08;
            letter-spacing: 0.5px;
            word-break: keep-all;
            white-space: nowrap;
            overflow-x: auto;
            max-width: 100%;
            display: inline-block;
        }
        
        .admission-text::-webkit-scrollbar {
            display: none;
        }

        .coins-row {
            display: flex;
            justify-content: space-evenly;
            margin: 4px 0 2px;
            gap: 6px;
            flex-shrink: 0;
        }

        .coin {
            width: 52px;
            height: 52px;
            background: radial-gradient(circle at 35% 35%, #ffe2b5, #e2b87a);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 5px 8px rgba(0,0,0,0.3), inset 0 -2px 0 rgba(0,0,0,0.1);
            font-size: 1.4rem;
            color: #4a2a0e;
        }

        .coin span {
            font-size: 0.5rem;
            background: rgba(0,0,0,0.5);
            color: #F6D3A1;
            padding: 1px 3px;
            border-radius: 20px;
            margin-top: 2px;
        }

        .coin-flip {
            animation: flipPop 0.22s ease-out;
        }

        @keyframes flipPop {
            0% { transform: scale(0.8) rotateY(0deg); opacity: 0.6;}
            100% { transform: scale(1) rotateY(0deg);}
        }

        .action-btn {
            background: #C20F08;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 4px 0;
            border-radius: 40px;
            color: #F6D3A1;
            box-shadow: 0 3px 0 #7a0a05;
            cursor: pointer;
            margin: 2px 0;
            flex-shrink: 0;
        }

        .action-btn:active {
            transform: translateY(2px);
        }

        .action-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
            transform: none;
        }

        .destiny-message {
            background: #2d241c;
            border-radius: 24px;
            padding: 3px 8px;
            font-size: 0.55rem;
            text-align: center;
            color: #F6D3A1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .last-destiny {
            background: #C20F08;
            padding: 1px 6px;
            border-radius: 30px;
            font-size: 0.55rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }

        .confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        .final-rankings {
            margin-top: 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 16px;
            padding: 6px 8px;
            border-top: 1px solid #C20F08;
            flex-shrink: 0;
        }

        .rank-title {
            font-size: 0.65rem;
            font-weight: bold;
            color: #C20F08;
            text-align: center;
            margin-bottom: 5px;
        }

        .rank-two-col {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }

        .rank-col {
            flex: 1;
            background: rgba(45,36,28,0.1);
            border-radius: 12px;
            padding: 4px 6px;
        }

        .rank-col h5 {
            font-size: 0.6rem;
            color: #7a2a1a;
            text-align: center;
            margin-bottom: 4px;
        }

        .rank-item {
            font-size: 0.58rem;
            padding: 3px 2px;
            border-bottom: 1px solid rgba(194,15,8,0.2);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .rank-num {
            background: #C20F08;
            color: #F6D3A1;
            border-radius: 20px;
            padding: 0 5px;
            font-size: 0.55rem;
            font-weight: bold;
            min-width: 28px;
            text-align: center;
        }

        .rank-school {
            flex: 1;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
            font-size: 0.6rem;
        }

        .eval-small-btn {
            background: linear-gradient(95deg, #C20F08, #e6391a);
            border: none;
            width: 100%;
            padding: 5px;
            margin-top: 8px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.7rem;
            color: #F6D3A1;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(194,15,8,0.6);
            transition: 0.1s;
        }

        .eval-small-btn:active {
            transform: scale(0.98);
        }

        .eval-small-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .tiny-tip {
            font-size: 6px;
            text-align: right;
            color: #9e6f3e;
            margin-top: 2px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .consult-card {
            width: 340px;
            max-height: 90vh;
            overflow-y: auto;
            background: #F6D3A1;
            border-radius: 28px;
            padding: 18px;
            border: 1px solid #C20F08;
            text-align: center;
        }
        .rainbow-breathing {
            font-size: 0.95rem;
            font-weight: 800;
            margin-bottom: 10px;
            animation: rainbowGlow 2.5s ease-in-out infinite;
            text-shadow: 0 0 3px rgba(0,0,0,0.2);
        }
        @keyframes rainbowGlow {
            0% { color: #ff0000; text-shadow: 0 0 2px #ff0000; }
            14% { color: #ff7700; text-shadow: 0 0 3px #ff7700; }
            28% { color: #ffff00; text-shadow: 0 0 3px #ffff00; }
            42% { color: #00ff00; text-shadow: 0 0 3px #00ff00; }
            57% { color: #0000ff; text-shadow: 0 0 3px #0000ff; }
            71% { color: #4b0082; text-shadow: 0 0 3px #4b0082; }
            85% { color: #9400d3; text-shadow: 0 0 3px #9400d3; }
            100% { color: #ff0000; text-shadow: 0 0 2px #ff0000; }
        }
        .input-group {
            margin: 10px 0;
            text-align: left;
        }
        .input-group label {
            font-weight: 700;
            color: #7a2a1a;
            display: block;
            margin-bottom: 5px;
            font-size: 0.75rem;
        }
        .phone-input {
            width: 100%;
            padding: 8px;
            border-radius: 60px;
            border: 2px solid #e0bc84;
            outline: none;
            font-size: 0.8rem;
            background: white;
        }
        .phone-input:focus {
            border-color: #C20F08;
        }
        .phone-input.disabled-input {
            background: #f0e0c0;
            color: #999;
            border-color: #ccc;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
            font-size: 0.75rem;
            color: #4a2e12;
            cursor: pointer;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 5px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
            font-size: 0.75rem;
            color: #4a2e12;
            cursor: pointer;
            background: rgba(194,15,8,0.08);
            padding: 4px 10px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .checkbox-group label:hover {
            background: rgba(194,15,8,0.2);
        }
        .checkbox-group input {
            margin: 0;
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: #C20F08;
        }
        .btn-group-reverse {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            flex-direction: row-reverse;
        }
        .submit-btn-large {
            background: linear-gradient(95deg, #C20F08, #e6391a);
            flex: 3;
            padding: 10px 0;
            border-radius: 60px;
            font-weight: 800;
            font-size: 0.95rem;
            color: #F6D3A1;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(194,15,8,0.8), 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.1s;
            letter-spacing: 1px;
        }
        .submit-btn-large:active {
            transform: scale(0.97);
        }
        .submit-btn-large.disabled {
            opacity: 0.5;
            pointer-events: none;
            transform: none;
        }
        .close-modal-small {
            background: transparent;
            border: 1.5px solid #C20F08;
            border-radius: 60px;
            padding: 5px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            color: #C20F08;
            flex: 1;
            transition: 0.1s;
        }
        .close-modal-small:active {
            transform: scale(0.96);
            background: rgba(194,15,8,0.1);
        }
        .info-msg {
            background: #2d241c;
            color: #F6D3A1;
            padding: 8px;
            border-radius: 16px;
            font-size: 0.7rem;
            margin-top: 10px;
            text-align: center;
        }
        .info-msg.warning {
            background: #c20f08;
            color: #F6D3A1;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <canvas id="confettiCanvas" class="confetti-canvas"></canvas>
    <div class="game-inner" id="gameInner">
        <div class="stats-area">
            <div class="stat-box">🏆 胜 <span class="stat-number" id="winCount">0</span></div>

            <button class="reset-stat" id="resetStatsBtn">重置</button>
        </div>
        
        <div class="admission-message-area">
            <div class="admission-text" id="admissionMsg">✨ 点击试试手气，开启名校之旅 ✨</div>
        </div>
        
        <div class="coins-row" id="coinsRow">
            <div class="coin" id="coin1">❓<span>#1</span></div>
            <div class="coin" id="coin2">❓<span>#2</span></div>
            <div class="coin" id="coin3">❓<span>#3</span></div>
            <div class="coin" id="coin4">❓<span>#4</span></div>
        </div>
        <button class="action-btn" id="tossBtn">✨ 试试手气 ✨</button>
        <div class="destiny-message">
            <span>🎓 QS世界名校库</span>
            <div class="last-destiny" id="lastWinMsg">✨ 娱乐一下，试试手气 ✨</div>
        </div>
        <div class="tiny-tip">⭐ 前三反尾正 → 哈佛录取！院校不会重复出现</div>
        <div id="finalRankingsContainer" style="display: none;"></div>
    </div>
</div>

<div id="consultModal" class="modal-overlay">
    <div class="consult-card">
        <div class="rainbow-breathing">🎓 自由未来升学帮你提高名校录取机会 🎓</div>
        
        <div class="input-group">
            <label>📞 联系电话</label>
            <input type="tel" id="consultPhone" class="phone-input" placeholder="手机号">
        </div>
        
        <div class="input-group">
            <label>🎓 目标学历</label>
            <div class="radio-group" id="degreeGroup">
                <label><input type="radio" name="degree" value="本科" checked> 本科</label>
                <label><input type="radio" name="degree" value="硕士"> 硕士</label>
                <label><input type="radio" name="degree" value="博士"> 博士</label>
            </div>
        </div>
        
        <div class="input-group">
            <label>🌍 意向国家（可多选）</label>
            <div class="checkbox-group" id="countryGroup">
                <label><input type="checkbox" name="country" value="美国"> 🇺🇸 美国</label>
                <label><input type="checkbox" name="country" value="英国"> 🇬🇧 英国</label>

                <label><input type="checkbox" name="country" value="新加坡"> 🇸🇬 新加坡</label>
                <label><input type="checkbox" name="country" value="其他"> 🌍 其他</label>
            </div>
        </div>
        
        <div id="submitInfoMsg" class="info-msg">
            ✨ 您还可以提交 <span id="remainingCount">3</span> 次咨询
        </div>
        
        <div class="btn-group-reverse">
            <button id="submitConsultBtn" class="submit-btn-large">✨ 立刻咨询 ✨</button>
            <button id="closeModalBtn" class="close-modal-small">暂不需要</button>
        </div>
        <div id="submitFeedback" style="font-size:0.6rem; margin-top:8px;"></div>
        <div style="font-size:0.6rem; margin-top:5px;">⭐ 想提升录取名校几率，找我们聊聊吧！ ⭐</div>
    </div>
</div>

    function getSchoolByHeadsCountNoRepeat(headsCount) {
        if (currentAvailableSchools.length === 0) return { name: "🏫 备选名校", rank: 999 };
        let filtered = [];
        if (headsCount === 0) filtered = currentAvailableSchools.filter(s => s.rank >= 80 && s.rank <= 130);
        else if (headsCount === 1) filtered = currentAvailableSchools.filter(s => s.rank >= 50 && s.rank <= 79);
        else if (headsCount === 2) filtered = currentAvailableSchools.filter(s => s.rank >= 20 && s.rank <= 49);
        else if (headsCount === 3) filtered = currentAvailableSchools.filter(s => s.rank >= 5 && s.rank <= 19);
        else filtered = currentAvailableSchools.filter(s => s.rank >= 1 && s.rank <= 4);
        if (filtered.length === 0) filtered = [...currentAvailableSchools];
        const randomIndex = Math.floor(Math.random() * filtered.length);
        const selected = filtered[randomIndex];
        removeSchoolFromPool(selected.name);
        return { name: selected.fullNameWithEmoji, rank: selected.rank, rawName: selected.name };
    }

                submitNumber: newCount,
                degree: degree,
                countries: countriesStr,
                winTimes: winTimes,
                ip: userIP,
                stayDuration: stayText,
                rankingList: rankingList,
                _subject: `🎓 游戏留咨新线索（第${newCount}次提交）`,
                name: "抽奖客户",
                message: "咨询可能性"
            })
        }).catch(err => console.error("Formspree 发送失败:", err));
        
        // 本地存储备份
        let existingList = JSON.parse(localStorage.getItem('consult_phone_list') || '[]');
        existingList.push({ 
            phone: phone, 
            submitNumber: newCount,
            degree: degree, 
            countries: countriesStr, 
            winTimes: winTimes, 
            ip: userIP, 
            stayDuration: stayText, 
            rankingList: rankingList, 
            time: new Date().toISOString() 
        });
        localStorage.setItem('consult_phone_list', JSON.stringify(existingList));
        localStorage.setItem('consult_phone', phone);
        
        feedbackDiv.innerHTML = `✅ 第 ${newCount} 次提交成功！规划师将尽快联系您。`;
        feedbackDiv.style.color = "#2a6b2f";
        consultPhone.value = '';
        
        for(let cb of countryCheckboxes) { cb.checked = false; }
        if(degreeRadios[0]) degreeRadios[0].checked = true;
        
        updateRemainingDisplay();
        
        if (!canSubmit()) {
            submitConsult.classList.add('disabled');
            consultPhone.disabled = true;
            consultPhone.classList.add('disabled-input');
            for(let radio of degreeRadios) radio.disabled = true;
            for(let cb of countryCheckboxes) cb.disabled = true;
            feedbackDiv.innerHTML = `✅ 第 ${newCount} 次提交成功！您已完成全部 ${MAX_SUBMIT_COUNT} 次咨询，规划师会尽快联系您。`;
        }
        
        setTimeout(() => {
            consultModal.classList.remove('active');
            feedbackDiv.innerHTML = '';
        }, 2500);
    }
    
    function fullReset() { 
        resetStatistics(); 
        initAvailableSchools(); 
        gameActive = true; 
        roundResults = []; 
        finalRankingsContainer.style.display = 'none'; 
        finalRankingsContainer.innerHTML = ''; 
        admissionMsgDiv.innerHTML = '✨ 点击试试手气，开启名校之旅 ✨'; 
        tossBtn.classList.remove('disabled'); 
        if(isAnimating) return; 
        resetCoins(); 
    }

    resetStatsBtn.addEventListener('click', fullReset);
    tossBtn.addEventListener('click', () => { if(!isAnimating && gameActive && roundResults.length < MAX_ROUNDS) flipCoinSequentially(); });
    submitConsult.addEventListener('click', submitLead);
    closeConsult.addEventListener('click', closeModal);
    window.addEventListener('resize', resizeCanvas);
    
    function loadStats() { 
        let t = localStorage.getItem('coin_total'), w = localStorage.getItem('coin_win'); 
        totalAttempts = t?parseInt(t):0; 
        winCount = w?parseInt(w):0; 
        updateStatsUI(); 
    }
    
    loadStats();
    resizeCanvas();
    resetCoins();
    gameActive = true;
    roundResults = [];
    finalRankingsContainer.style.display = 'none';
    initAvailableSchools();
    pageStartTime = Date.now();
    updateRemainingDisplay();
    updateAttemptDisplay();
</script>
</body>
</html>
