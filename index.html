<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>名校缘分·悬念硬币 | QS世界名校库</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .game-card {
            max-width: 500px;
            width: 100%;
            background: #fff9ef;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: all 0.2s;
            border: 1px solid rgba(194,15,8,0.2);
        }

        .game-inner {
            padding: 20px 20px 24px;
        }

        .stats-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fef3e0;
            border-radius: 60px;
            padding: 6px 12px;
            margin-bottom: 16px;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: #2d2b26;
            padding: 4px 12px;
            border-radius: 40px;
            color: #ffecb3;
            font-size: 0.75rem;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .stat-number {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffb347;
        }

        .attempt-badge {
            background: #C20F08;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .reset-btn {
            background: #C20F08;
            border: none;
            color: white;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: bold;
        }

        .coins-row {
            display: flex;
            justify-content: space-evenly;
            margin: 20px 0;
            gap: 12px;
        }

        .coin {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 35% 35%, #ffe2b5, #e2b87a);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 8px 12px rgba(0,0,0,0.2);
            font-size: 1.8rem;
            transition: 0.1s;
        }

        .coin span {
            font-size: 0.6rem;
            background: rgba(0,0,0,0.5);
            color: #ffecb3;
            padding: 2px 6px;
            border-radius: 20px;
            margin-top: 4px;
        }

        .coin-flip {
            animation: flipPop 0.25s ease-out;
        }

        @keyframes flipPop {
            0% { transform: scale(0.8) rotateY(0deg); opacity: 0.6;}
            100% { transform: scale(1) rotateY(0deg);}
        }

        .action-btn {
            background: #C20F08;
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            margin: 8px 0;
            cursor: pointer;
            box-shadow: 0 4px 0 #7a0a05;
            transition: 0.05s linear;
        }

        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a0a05;
        }

        .destiny-msg {
            background: #2d241c;
            border-radius: 30px;
            padding: 8px 12px;
            font-size: 0.7rem;
            text-align: center;
            color: #ffecb3;
            margin-top: 8px;
        }

        .final-rank {
            background: #fae6c3;
            border-radius: 24px;
            padding: 12px;
            margin-top: 16px;
        }

        .rank-title {
            font-weight: bold;
            color: #C20F08;
            text-align: center;
            margin-bottom: 8px;
        }

        .two-columns {
            display: flex;
            gap: 12px;
        }

        .col {
            flex: 1;
            background: rgba(0,0,0,0.03);
            border-radius: 16px;
            padding: 6px;
        }

        .col h5 {
            font-size: 0.7rem;
            text-align: center;
            margin-bottom: 6px;
        }

        .rank-item {
            font-size: 0.65rem;
            padding: 4px;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 6px;
        }

        .rank-number {
            background: #C20F08;
            color: white;
            border-radius: 20px;
            padding: 0 6px;
            font-size: 0.6rem;
        }

        .eval-btn {
            background: linear-gradient(95deg, #C20F08, #e65c2e);
            width: 100%;
            border: none;
            padding: 8px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            width: 90%;
            max-width: 360px;
            background: #fff9ef;
            border-radius: 32px;
            padding: 20px;
            border-top: 5px solid #C20F08;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 60px;
            border: 1px solid #ccc;
        }

        .radio-group, .check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 10px 0;
        }

        .radio-group label, .check-group label {
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .submit-btn {
            background: #C20F08;
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: none;
            color: white;
            font-weight: bold;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="game-card" id="gameContainer">
    <div class="game-inner">
        <div class="stats-area">
            <div class="stat-badge">🏆 胜利 <span class="stat-number" id="winCount">0</span></div>
            <div class="stat-badge">🎲 总抛次 <span class="stat-number" id="totalAttempts">0</span></div>
            <div class="attempt-badge">📋 咨询剩余 <span id="remainCount">3</span>/3</div>
            <button class="reset-btn" id="resetGameBtn">重置游戏</button>
        </div>

        <div style="text-align:center; margin:4px 0; font-size:0.8rem; font-weight:bold;" id="admissionMsg">✨ 点击试试手气，开启名校之旅 ✨</div>

        <div class="coins-row" id="coinsRow">
            <div class="coin" id="coin1">❓<span>#1</span></div>
            <div class="coin" id="coin2">❓<span>#2</span></div>
            <div class="coin" id="coin3">❓<span>#3</span></div>
            <div class="coin" id="coin4">❓<span>#4</span></div>
        </div>
        <button class="action-btn" id="tossBtn">✨ 试试手气 ✨</button>
        <div class="destiny-msg" id="lastMsg">✨ 娱乐一下，试试你和名校的缘分 ✨</div>
        <div id="finalPanel" style="display:none;" class="final-rank"></div>
    </div>
</div>

<div id="consultModal" class="modal">
    <div class="modal-card">
        <h3 style="color:#C20F08; text-align:center;">🎓 自由未来升学</h3>
        <p style="text-align:center; font-size:0.8rem;">提升录取名校几率，找我们聊聊吧！</p>
        <input type="tel" id="phoneInput" class="input-field" placeholder="手机号">
        <div class="radio-group">
            <label><input type="radio" name="degree" value="本科" checked> 本科</label>
            <label><input type="radio" name="degree" value="硕士"> 硕士</label>
            <label><input type="radio" name="degree" value="博士"> 博士</label>
        </div>
        <div class="check-group" id="countryGroup">
            <label><input type="checkbox" value="美国"> 🇺🇸 美国</label>
            <label><input type="checkbox" value="英国"> 🇬🇧 英国</label>
            <label><input type="checkbox" value="中国香港"> 🇭🇰 中国香港</label>
            <label><input type="checkbox" value="澳大利亚"> 🇦🇺 澳大利亚</label>
            <label><input type="checkbox" value="新加坡"> 🇸🇬 新加坡</label>
            <label><input type="checkbox" value="其他"> 🌍 其他</label>
        </div>
        <div id="modalMsg" style="font-size:0.7rem; color:#C20F08; text-align:center; margin:8px;"></div>
        <button id="submitConsult" class="submit-btn">✨ 立刻咨询 ✨</button>
        <button id="closeModal" style="margin-top:8px; background:#ddd; border:none; padding:6px; border-radius:40px;">暂不需要</button>
    </div>
</div>

<script>
    // ================= 名校库 =================
    const masterList = [
        { rank:1, name:"麻省理工学院", emoji:"🇺🇸" },{ rank:2, name:"剑桥大学", emoji:"🇬🇧" },{ rank:3, name:"牛津大学", emoji:"🇬🇧" },
        { rank:4, name:"哈佛大学", emoji:"🇺🇸" },{ rank:5, name:"斯坦福大学", emoji:"🇺🇸" },{ rank:6, name:"帝国理工", emoji:"🇬🇧" },
        { rank:7, name:"苏黎世联邦理工", emoji:"🇨🇭" },{ rank:8, name:"新加坡国立", emoji:"🇸🇬" },{ rank:9, name:"伦敦大学学院", emoji:"🇬🇧" },
        { rank:10, name:"加州伯克利", emoji:"🇺🇸" },{ rank:12, name:"宾夕法尼亚", emoji:"🇺🇸" },{ rank:14, name:"墨尔本大学", emoji:"🇦🇺" },
        { rank:16, name:"耶鲁大学", emoji:"🇺🇸" },{ rank:19, name:"悉尼大学", emoji:"🇦🇺" },{ rank:21, name:"多伦多大学", emoji:"🇨🇦" },
        { rank:25, name:"香港大学", emoji:"🇭🇰" },{ rank:27, name:"港科大", emoji:"🇭🇰" },{ rank:38, name:"港中文", emoji:"🇭🇰" }
    ];
    let availablePool = [...masterList];
    let harvardUsed = false;
    let roundResults = [];
    let gameActive = true;
    let isAnimating = false;
    let totalAttempts = 0;
    let winCount = 0;
    const MAX_ROUNDS = 10;

    // 提交次数限制
    let remainSubmit = (()=>{
        let stored = localStorage.getItem('consult_submit_count');
        let used = stored ? parseInt(stored) : 0;
        return Math.max(0, 3 - used);
    })();
    let startTime = Date.now();

    function updateRemainUI() {
        document.getElementById('remainCount').innerText = remainSubmit;
    }

    function markSubmitUsed() {
        let used = 3 - remainSubmit;
        let newUsed = used+1;
        localStorage.setItem('consult_submit_count', newUsed);
        remainSubmit = Math.max(0, 3 - newUsed);
        updateRemainUI();
    }

    function getRandomSchool() {
        if(!harvardUsed && availablePool.some(s=>s.name==="哈佛大学")) {
            harvardUsed = true;
            availablePool = availablePool.filter(s=>s.name!=="哈佛大学");
            return { name:"🇺🇸 哈佛大学", rank:4, isHarvard:true };
        }
        if(availablePool.length===0) availablePool = [...masterList];
        let idx = Math.floor(Math.random()*availablePool.length);
        let picked = availablePool[idx];
        availablePool.splice(idx,1);
        return { name:`${picked.emoji} ${picked.name}`, rank:picked.rank, isHarvard:false };
    }

    async function flipCoins() {
        if(isAnimating || !gameActive || roundResults.length>=MAX_ROUNDS) return;
        isAnimating = true;
        document.getElementById('tossBtn').disabled = true;
        let results = [];
        for(let i=0;i<4;i++) results.push(Math.random()<0.5 ? '正' : '反');
        for(let i=0;i<4;i++) {
            let coinDiv = document.getElementById(`coin${i+1}`);
            coinDiv.classList.add('coin-flip');
            coinDiv.innerHTML = results[i]==='正' ? `🪙 正<span>#${i+1}</span>` : `🪙 反<span>#${i+1}</span>`;
            await new Promise(r=>setTimeout(()=>{coinDiv.classList.remove('coin-flip'); r();}, 220));
        }
        let isSpecial = (results[0]==='反' && results[1]==='反' && results[2]==='反' && results[3]==='正');
        let school;
        if(isSpecial) {
            winCount++;
            document.getElementById('winCount').innerText = winCount;
            school = { name:"🇺🇸 哈佛大学", rank:4, isHarvard:true };
            document.getElementById('admissionMsg').innerHTML = "🎉 恭喜录取 哈佛大学！本科录取率仅5% 🎉";
        } else {
            school = getRandomSchool();
            document.getElementById('admissionMsg').innerHTML = `✨ 恭喜录取 ${school.name} ✨`;
        }
        totalAttempts++;
        document.getElementById('totalAttempts').innerText = totalAttempts;
        roundResults.push(school);
        if(roundResults.length === MAX_ROUNDS) {
            gameActive = false;
            showFinalBoard();
        }
        isAnimating = false;
        document.getElementById('tossBtn').disabled = false;
    }

    function showFinalBoard() {
        let sorted = [...roundResults].sort((a,b)=>a.rank-b.rank);
        let html = `<div class="final-rank"><div class="rank-title">🏆 最终录取榜单 🏆</div><div class="two-columns">
            <div class="col"><h5>🏅 前5名</h5>${sorted.slice(0,5).map(s=>`<div class="rank-item"><span class="rank-number">${s.rank}</span> ${s.name}</div>`).join('')}</div>
            <div class="col"><h5>📌 后5名</h5>${sorted.slice(5,10).map(s=>`<div class="rank-item"><span class="rank-number">${s.rank}</span> ${s.name}</div>`).join('')}</div>
        </div><button class="eval-btn" id="showConsultFromGame">📊 评估申请可能性</button></div>`;
        document.getElementById('finalPanel').innerHTML = html;
        document.getElementById('finalPanel').style.display = 'block';
        document.getElementById('showConsultFromGame')?.addEventListener('click', ()=>showConsult());
    }

    // 留咨 + 云函数代理推送
    function showConsult() {
        if(remainSubmit<=0) { alert("您已达3次咨询上限"); return; }
        document.getElementById('consultModal').classList.add('active');
    }

    async function submitConsultData() {
        if(remainSubmit<=0) {
            document.getElementById('modalMsg').innerText = "已达上限";
            return;
        }
        let phone = document.getElementById('phoneInput').value.trim();
        if(!phone || !/^1[0-9]{10}$/.test(phone)) {
            document.getElementById('modalMsg').innerText = "请填11位手机号";
            return;
        }
        let degree = document.querySelector('input[name="degree"]:checked')?.value;
        let countries = Array.from(document.querySelectorAll('#countryGroup input:checked')).map(cb=>cb.value);
        if(countries.length===0) {
            document.getElementById('modalMsg').innerText = "请选意向国家";
            return;
        }
        let rankingText = roundResults.map((s,i)=>`${i+1}. ${s.name}`).join('\n');
        let winTimes = roundResults.filter(r=>r.isHarvard===true).length;
        let staySec = Math.floor((Date.now()-startTime)/1000);
        let ip = "未获取";
        try { let res = await fetch('https://api.ipify.org?format=json'); let data = await res.json(); ip = data.ip; } catch(e) {}
        
        const messageContent = `【抛缘游戏·留资】
📞 ${phone}
🎓 ${degree}
🌍 ${countries.join('、')}
🏆 哈佛命中${winTimes}次
⏱️ 停留${Math.floor(staySec/60)}分${staySec%60}秒
🖥️ IP:${ip}
📋 榜单:
${rankingText}`;

        // 使用云函数代理发送
        const proxyUrl = "https://1313227484-70kh8cohzz.ap-guangzhou.tencentscf.com";
        fetch(proxyUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: messageContent })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById('modalMsg').innerText = "✅ 提交成功！";
                markSubmitUsed();
                setTimeout(()=>closeModal(), 1500);
            } else {
                document.getElementById('modalMsg').innerText = "推送失败，可重试";
                console.error("代理返回错误:", data.error);
            }
        })
        .catch(err => {
            document.getElementById('modalMsg').innerText = "网络错误，请重试";
            console.error("请求代理失败:", err);
        });

        // 本地存储备份
        let prev = JSON.parse(localStorage.getItem('consult_records')||'[]');
        prev.push({phone, degree, countries, time:Date.now()});
        localStorage.setItem('consult_records', JSON.stringify(prev));
    }

    function closeModal() {
        document.getElementById('consultModal').classList.remove('active');
        document.getElementById('modalMsg').innerText = "";
        document.getElementById('phoneInput').value = "";
    }

    function resetGame() {
        if(isAnimating) return;
        totalAttempts = 0; winCount = 0; gameActive = true; 
        roundResults = [];
        availablePool = [...masterList];
        harvardUsed = false;
        document.getElementById('winCount').innerText = '0';
        document.getElementById('totalAttempts').innerText = '0';
        document.getElementById('finalPanel').style.display = 'none';
        document.getElementById('admissionMsg').innerHTML = "✨ 点击试试手气，开启名校之旅 ✨";
        for(let i=1;i<=4;i++) document.getElementById(`coin${i}`).innerHTML = `❓<span>#${i}</span>`;
        document.getElementById('tossBtn').disabled = false;
    }

    document.getElementById('tossBtn').addEventListener('click', flipCoins);
    document.getElementById('resetGameBtn').addEventListener('click', resetGame);
    document.getElementById('submitConsult').addEventListener('click', submitConsultData);
    document.getElementById('closeModal').addEventListener('click', closeModal);

    updateRemainUI();
    resetGame();
</script>
</body>
</html>
